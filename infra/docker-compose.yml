version: '3.8'

services:
  frontend:
    build: ../frontend
    volumes:
      - ../frontend/build:/usr/share/nginx/html
    restart: "no"

  backend:
    build: ../backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../backend:/app
      - ../backend/media:/app/media
    depends_on:
      - frontend
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/build:/usr/share/nginx/html
      - ../backend/media:/media          # ← КРИТИЧНО! nginx видит файлы напрямую
    depends_on:
      - backend
      - frontend
    restart: always
